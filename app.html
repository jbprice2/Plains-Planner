<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Plains Planner">
<meta name="theme-color" content="#0b2341">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<title>The Plains Planner</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Anton&family=Libre+Franklin:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap');

  :root{
    --navy:#0b2341;
    --navy-light:#15355c;
    --orange:#dd550c;
    --orange-light:#f4934f;
    --cream:#faf6ee;
    --paper:#f2ead9;
    --paper-edge:#e6dcc4;
    --ink:#211d18;
    --ink-soft:#7a7163;
    --gold:#c9a227;
    --line:#e0d6c2;
    --good:#3f7a6b;
    --danger:#b3402c;
  }

  .dow-picker{
    display:flex;
    gap:0.35rem;
    flex-wrap:wrap;
  }
  .dow-check{
    display:flex;
    align-items:center;
    justify-content:center;
    width:2.4rem;
    height:2.4rem;
    border:1px solid var(--line);
    border-radius:8px;
    background:var(--cream);
    font-size:0.8rem;
    font-weight:700;
    cursor:pointer;
    user-select:none;
    transition:background 0.12s, border-color 0.12s, color 0.12s;
  }
  .dow-check input{ display:none; }
  .dow-check.active{
    background:var(--orange);
    border-color:var(--orange);
    color:#fff;
  }
  .recur-tag{
    display:inline-block;
    font-family:'JetBrains Mono', monospace;
    font-size:0.68rem;
    letter-spacing:0.06em;
    text-transform:uppercase;
    color:var(--navy);
    background:var(--paper-edge);
    padding:0.15rem 0.4rem;
    border-radius:4px;
    margin-left:0.4rem;
    vertical-align:middle;
  }
  .schedule-card{
    background:var(--paper);
    border:1px solid var(--paper-edge);
    border-radius:12px;
    padding:1.1rem;
    display:flex;
    flex-direction:column;
    gap:0.45rem;
  }

  .color-picker{
    display:flex;
    flex-wrap:wrap;
    gap:0.5rem;
  }
  .color-swatch{
    width:2.1rem;
    height:2.1rem;
    border-radius:50%;
    border:2px solid transparent;
    cursor:pointer;
    padding:0;
    position:relative;
    transition:transform 0.1s, border-color 0.12s;
  }
  .color-swatch:hover{ transform:scale(1.08); }
  .color-swatch.active{ border-color:var(--ink); }
  .color-swatch.active::after{
    content:'✓';
    position:absolute;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    color:#fff;
    font-size:0.9rem;
    font-weight:700;
    text-shadow:0 1px 2px rgba(0,0,0,0.4);
  }
  .color-swatch.auto{
    background:var(--paper);
    border:1px solid var(--line);
    font-family:'JetBrains Mono', monospace;
    font-size:0.6rem;
    color:var(--ink-soft);
    font-weight:700;
  }
  .color-swatch.auto.active{
    border-color:var(--ink);
    color:var(--ink);
  }
  .color-swatch.auto.active::after{ content:none; }

  .event-dot{
    display:inline-block;
    width:9px;
    height:9px;
    border-radius:50%;
    margin-right:0.4rem;
    flex-shrink:0;
    position:relative;
    top:1px;
  }

  /* ---------- This Week digest ---------- */
  .week-day{
    background:var(--paper);
    border:1px solid var(--paper-edge);
    border-radius:12px;
    padding:1rem 1.1rem;
    margin-bottom:0.85rem;
  }
  .week-day.is-today{ border-color:var(--orange); border-width:2px; }
  .week-day-header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:0.5rem;
  }
  .week-day-header h3{ font-size:0.95rem; }
  .today-pill{
    background:var(--orange);
    color:#fff;
    font-family:'JetBrains Mono', monospace;
    font-size:0.65rem;
    letter-spacing:0.08em;
    text-transform:uppercase;
    padding:0.15rem 0.5rem;
    border-radius:999px;
  }
  .week-add{
    background:none;
    border:none;
    color:var(--orange);
    font-weight:700;
    font-size:0.8rem;
    padding:0.2rem;
  }
  .week-empty{
    color:var(--ink-soft);
    font-size:0.85rem;
    margin:0;
  }
  .week-event{
    display:flex;
    align-items:flex-start;
    padding:0.4rem 0;
    border-top:1px solid var(--paper-edge);
  }
  .week-event:first-of-type{ border-top:none; }
  .week-event-main{ flex:1; min-width:0; }
  .week-event-title{ font-weight:700; font-size:0.92rem; }

  *{ box-sizing:border-box; }

  body{
    margin:0;
    background:var(--cream);
    color:var(--ink);
    font-family:'Libre Franklin', sans-serif;
    -webkit-font-smoothing:antialiased;
  }

  h1,h2,h3{
    font-family:'Anton', sans-serif;
    font-weight:400;
    letter-spacing:0.04em;
    text-transform:uppercase;
    margin:0;
  }

  .mono{ font-family:'JetBrains Mono', monospace; }

  button{ font-family:inherit; cursor:pointer; }
  input, select, textarea{ font-family:inherit; font-size:0.95rem; }

  /* ---------- Layout shell ---------- */
  .app{ max-width:1080px; margin:0 auto; padding:0 0 4rem; }

  /* ---------- Hero / header ---------- */
  .hero{
    background:var(--navy);
    color:var(--cream);
    border-radius:0 0 18px 18px;
    overflow:hidden;
    margin-bottom:1.75rem;
  }
  .hero-top{
    display:flex;
    flex-wrap:wrap;
    align-items:flex-end;
    justify-content:space-between;
    gap:1rem;
    padding:1.75rem 1.5rem 1.25rem;
  }
  .brand-eyebrow{
    display:block;
    font-family:'JetBrains Mono', monospace;
    font-size:0.7rem;
    letter-spacing:0.32em;
    color:var(--orange-light);
    margin-bottom:0.35rem;
  }
  .brand h1{
    font-size:clamp(1.9rem, 5vw, 2.8rem);
    line-height:1;
  }
  .tabs{
    display:flex;
    gap:0.4rem;
  }
  .tab{
    background:transparent;
    border:1px solid rgba(250,246,238,0.35);
    color:var(--cream);
    padding:0.55rem 1.1rem;
    border-radius:999px;
    font-family:'Anton', sans-serif;
    letter-spacing:0.08em;
    font-size:0.85rem;
    transition:background 0.15s, color 0.15s, border-color 0.15s;
  }
  .tab:hover{ border-color:var(--orange-light); }
  .tab.active{
    background:var(--orange);
    border-color:var(--orange);
    color:var(--cream);
  }
  .tab:focus-visible, button:focus-visible, input:focus-visible, select:focus-visible, textarea:focus-visible, a:focus-visible{
    outline:2px solid var(--gold);
    outline-offset:2px;
  }

  /* ---------- Ticker (signature element) ---------- */
  .ticker{
    border-top:1px solid rgba(250,246,238,0.12);
    background:var(--navy-light);
    display:flex;
    align-items:stretch;
  }
  .ticker-label{
    flex:none;
    background:var(--orange);
    color:var(--navy);
    font-family:'Anton', sans-serif;
    letter-spacing:0.18em;
    font-size:0.75rem;
    padding:0.6rem 1rem;
    display:flex;
    align-items:center;
    white-space:nowrap;
  }
  .ticker-track{
    overflow:hidden;
    flex:1;
    position:relative;
    display:flex;
    align-items:center;
  }
  .ticker-content{
    display:flex;
    gap:2.5rem;
    white-space:nowrap;
    padding:0.6rem 1.25rem;
    font-family:'JetBrains Mono', monospace;
    font-size:0.85rem;
    animation:scroll-left 28s linear infinite;
  }
  .ticker-track:hover .ticker-content{ animation-play-state:paused; }
  .ticker-item .days{ color:var(--orange-light); font-weight:700; margin-right:0.5rem; }
  .ticker-empty{
    font-family:'JetBrains Mono', monospace;
    font-size:0.85rem;
    padding:0.6rem 1.25rem;
    color:rgba(250,246,238,0.65);
  }
  @keyframes scroll-left{
    from{ transform:translateX(0); }
    to{ transform:translateX(-50%); }
  }
  @media (prefers-reduced-motion: reduce){
    .ticker-content{ animation:none; overflow-x:auto; }
    .ticker-track{ overflow-x:auto; }
  }

  /* ---------- Toolbar ---------- */
  .toolbar{
    display:flex;
    flex-wrap:wrap;
    gap:0.6rem;
    align-items:center;
    margin:0 1.5rem 1.25rem;
  }
  .toolbar input[type="text"], .toolbar select{
    padding:0.55rem 0.8rem;
    border:1px solid var(--line);
    border-radius:8px;
    background:#fff;
    color:var(--ink);
  }
  .toolbar input[type="text"]{ flex:1; min-width:160px; }
  .toggle-pill{
    display:flex;
    align-items:center;
    gap:0.4rem;
    padding:0.5rem 0.9rem;
    border:1px solid var(--line);
    border-radius:999px;
    background:#fff;
    font-size:0.9rem;
    user-select:none;
  }
  .toggle-pill input{ accent-color:var(--orange); }

  .btn-primary{
    background:var(--orange);
    color:#fff;
    border:none;
    padding:0.6rem 1.1rem;
    border-radius:8px;
    font-weight:700;
    font-size:0.9rem;
    white-space:nowrap;
    transition:background 0.15s;
  }
  .btn-primary:hover{ background:#c44607; }
  .btn-secondary{
    background:#fff;
    color:var(--ink);
    border:1px solid var(--line);
    padding:0.6rem 1.1rem;
    border-radius:8px;
    font-weight:600;
    font-size:0.9rem;
  }
  .btn-secondary:hover{ border-color:var(--ink-soft); }
  .btn-text{
    background:none;
    border:none;
    color:var(--ink-soft);
    font-size:0.85rem;
    text-decoration:underline;
    padding:0.2rem;
  }
  .btn-text.danger{ color:var(--danger); }

  /* ---------- Clubs grid ---------- */
  main{ padding:0 1.5rem; }
  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(260px, 1fr));
    gap:1rem;
  }
  .card{
    background:var(--paper);
    border:1px solid var(--paper-edge);
    border-radius:12px;
    padding:1.1rem;
    display:flex;
    flex-direction:column;
    gap:0.55rem;
  }
  .card-top{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:0.5rem;
  }
  .tag{
    display:inline-block;
    color:#fff;
    font-family:'JetBrains Mono', monospace;
    font-size:0.7rem;
    letter-spacing:0.06em;
    padding:0.25rem 0.55rem;
    border-radius:5px;
    text-transform:uppercase;
  }
  .star-btn{
    background:none;
    border:none;
    font-size:1.25rem;
    line-height:1;
    color:var(--line);
    transition:color 0.15s, transform 0.1s;
  }
  .star-btn.active{ color:var(--gold); }
  .star-btn:hover{ transform:scale(1.12); }

  .card h3{ font-size:1.15rem; }
  .card .meta{ font-family:'JetBrains Mono', monospace; font-size:0.8rem; color:var(--ink-soft); margin:0; }
  .card .notes{ font-size:0.9rem; margin:0; color:var(--ink); }
  .card-actions{
    margin-top:auto;
    padding-top:0.6rem;
    border-top:1px solid var(--paper-edge);
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:0.5rem;
    flex-wrap:wrap;
  }
  .card-actions a{ color:var(--orange); font-weight:700; font-size:0.85rem; text-decoration:none; }
  .card-actions a:hover{ text-decoration:underline; }
  .card-actions .right{ display:flex; gap:0.75rem; }

  /* ---------- Empty states ---------- */
  .empty{
    grid-column:1/-1;
    text-align:center;
    padding:3rem 1.5rem;
    border:1px dashed var(--line);
    border-radius:12px;
    color:var(--ink-soft);
  }
  .empty h3{ color:var(--ink); margin-bottom:0.4rem; font-size:1.1rem; }
  .empty p{ margin:0 0 1rem; font-size:0.95rem; }

  /* ---------- Calendar ---------- */
  .cal-header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:0.75rem;
    margin-bottom:1rem;
  }
  .cal-nav{ display:flex; align-items:center; gap:0.6rem; }
  .cal-nav button{
    background:#fff;
    border:1px solid var(--line);
    border-radius:8px;
    width:2.2rem;
    height:2.2rem;
    font-size:1.1rem;
    color:var(--navy);
  }
  .cal-nav button:hover{ border-color:var(--orange); color:var(--orange); }
  .cal-grid{
    display:grid;
    grid-template-columns:repeat(7, 1fr);
    gap:6px;
    margin-bottom:1.25rem;
  }
  .cal-dow{
    text-align:center;
    font-family:'JetBrains Mono', monospace;
    font-size:0.7rem;
    letter-spacing:0.1em;
    color:var(--ink-soft);
    padding-bottom:0.3rem;
  }
  .cal-cell{
    background:var(--paper);
    border:1px solid var(--paper-edge);
    border-radius:8px;
    min-height:64px;
    padding:0.35rem;
    display:flex;
    flex-direction:column;
    align-items:flex-start;
    gap:0.25rem;
    text-align:left;
    color:var(--ink);
    transition:border-color 0.12s, background 0.12s;
  }
  .cal-cell:hover{ border-color:var(--orange-light); }
  .cal-cell.outside{ opacity:0.35; }
  .cal-cell.today{ border-color:var(--orange); border-width:2px; }
  .cal-cell.selected{ background:#fff; border-color:var(--navy); }
  .cal-daynum{ font-family:'JetBrains Mono', monospace; font-size:0.8rem; font-weight:700; }
  .cal-dots{ display:flex; gap:3px; flex-wrap:wrap; }
  .cal-dot{ width:7px; height:7px; border-radius:50%; background:var(--orange); }

  .day-panel{
    background:var(--paper);
    border:1px solid var(--paper-edge);
    border-radius:12px;
    padding:1.1rem 1.25rem;
  }
  .day-panel h3{ font-size:1rem; margin-bottom:0.75rem; }
  .event-row{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:0.75rem;
    padding:0.6rem 0;
    border-bottom:1px solid var(--paper-edge);
  }
  .event-row:last-of-type{ border-bottom:none; }
  .event-main{ flex:1; min-width:0; }
  .event-title{ font-weight:700; font-size:0.95rem; }
  .event-sub{ font-family:'JetBrains Mono', monospace; font-size:0.78rem; color:var(--ink-soft); margin-top:0.1rem; }
  .event-notes{ font-size:0.85rem; margin-top:0.2rem; color:var(--ink); }
  .event-actions{ display:flex; gap:0.6rem; flex-shrink:0; }

  /* ---------- Modal ---------- */
  .modal-overlay{
    position:fixed; inset:0;
    background:rgba(11,35,65,0.55);
    display:none;
    align-items:center;
    justify-content:center;
    padding:1rem;
    z-index:50;
  }
  .modal-overlay.open{ display:flex; }
  .modal{
    background:#fff;
    border-radius:14px;
    padding:1.5rem;
    width:100%;
    max-width:440px;
    max-height:90vh;
    overflow-y:auto;
  }
  .modal h2{ font-size:1.3rem; margin-bottom:1rem; }
  .field{ margin-bottom:0.9rem; display:flex; flex-direction:column; gap:0.3rem; }
  .field label{ font-size:0.8rem; font-weight:700; letter-spacing:0.04em; color:var(--ink-soft); text-transform:uppercase; }
  .field input, .field select, .field textarea{
    border:1px solid var(--line);
    border-radius:8px;
    padding:0.6rem 0.7rem;
    background:var(--cream);
    color:var(--ink);
    width:100%;
  }
  .field textarea{ resize:vertical; min-height:60px; }
  .field-row{ display:flex; gap:0.6rem; }
  .field-row .field{ flex:1; }
  .modal-actions{
    display:flex;
    justify-content:flex-end;
    gap:0.6rem;
    margin-top:1.1rem;
  }
  .modal-actions .left{ margin-right:auto; }

  .hero-actions{
    display:flex;
    gap:0.4rem;
    align-items:center;
  }
  .hero-btn{
    background:transparent;
    border:1px solid rgba(250,246,238,0.35);
    color:var(--cream);
    padding:0.4rem 0.75rem;
    border-radius:999px;
    font-family:'JetBrains Mono', monospace;
    font-size:0.72rem;
    letter-spacing:0.06em;
    text-transform:uppercase;
    transition:border-color 0.15s, background 0.15s;
    white-space:nowrap;
  }
  .hero-btn:hover{ border-color:var(--orange-light); background:rgba(250,246,238,0.08); }

  /* ---------- Portfolio ---------- */
  .portfolio-stats{
    display:flex;
    gap:1rem;
    flex-wrap:wrap;
    margin-bottom:1.25rem;
  }
  .stat-chip{
    background:var(--paper);
    border:1px solid var(--paper-edge);
    border-radius:10px;
    padding:0.65rem 1rem;
    display:flex;
    flex-direction:column;
    align-items:center;
    min-width:90px;
  }
  .stat-chip .stat-num{
    font-family:'Anton', sans-serif;
    font-size:1.6rem;
    line-height:1;
    color:var(--navy);
  }
  .stat-chip .stat-label{
    font-family:'JetBrains Mono', monospace;
    font-size:0.65rem;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color:var(--ink-soft);
    margin-top:0.2rem;
  }
  .portfolio-section-title{
    font-size:0.75rem;
    font-family:'JetBrains Mono', monospace;
    letter-spacing:0.12em;
    text-transform:uppercase;
    color:var(--ink-soft);
    margin:0 0 0.6rem;
    padding-bottom:0.35rem;
    border-bottom:1px solid var(--line);
  }
  .activity-row{
    background:var(--paper);
    border:1px solid var(--paper-edge);
    border-radius:10px;
    padding:0.85rem 1rem;
    margin-bottom:0.6rem;
    display:flex;
    gap:0.75rem;
    align-items:flex-start;
  }
  .activity-hours{
    flex:none;
    background:var(--navy);
    color:var(--cream);
    border-radius:8px;
    padding:0.3rem 0.55rem;
    font-family:'Anton', sans-serif;
    font-size:1rem;
    line-height:1.2;
    text-align:center;
    min-width:3rem;
  }
  .activity-hours span{
    display:block;
    font-family:'JetBrains Mono', monospace;
    font-size:0.55rem;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color:var(--orange-light);
  }
  .activity-body{ flex:1; min-width:0; }
  .activity-title{ font-weight:700; font-size:0.95rem; }
  .activity-meta{ font-family:'JetBrains Mono', monospace; font-size:0.78rem; color:var(--ink-soft); margin-top:0.15rem; }
  .activity-desc{ font-size:0.88rem; margin-top:0.3rem; color:var(--ink); }
  .act-cat-tag{
    display:inline-block;
    font-family:'JetBrains Mono', monospace;
    font-size:0.65rem;
    letter-spacing:0.06em;
    text-transform:uppercase;
    padding:0.15rem 0.45rem;
    border-radius:4px;
    margin-right:0.4rem;
  }
  .org-portfolio-card{
    background:var(--paper);
    border:1px solid var(--paper-edge);
    border-radius:12px;
    padding:1rem 1.1rem;
    margin-bottom:0.75rem;
    display:flex;
    gap:1rem;
    align-items:flex-start;
  }
  .org-portfolio-accent{
    width:5px;
    border-radius:3px;
    flex:none;
    align-self:stretch;
    min-height:40px;
  }
  .org-portfolio-body{ flex:1; min-width:0; }
  .org-portfolio-role{
    font-family:'JetBrains Mono', monospace;
    font-size:0.78rem;
    color:var(--orange);
    font-weight:700;
    text-transform:uppercase;
    letter-spacing:0.05em;
  }

  /* ---------- Onboarding ---------- */
  .onboard-feature{
    display:flex;
    gap:0.75rem;
    align-items:flex-start;
    margin-bottom:0.85rem;
  }
  .onboard-icon{
    font-size:1.4rem;
    flex:none;
    width:2rem;
    text-align:center;
  }
  .onboard-feature h4{
    font-size:0.9rem;
    margin:0 0 0.1rem;
    font-family:'Anton', sans-serif;
    letter-spacing:0.04em;
    font-weight:400;
  }
  .onboard-feature p{ margin:0; font-size:0.85rem; color:var(--ink-soft); }

  /* ---------- Mobile ---------- */
  @media (max-width:700px){
    .tabs{ flex-wrap:wrap; justify-content:flex-end; }
    .tab{ font-size:0.78rem; padding:0.45rem 0.85rem; }
    .hero-actions{ justify-content:flex-end; }
    .hero-btn{ font-size:0.65rem; padding:0.35rem 0.6rem; }
  }

  @media (max-width:560px){
    .hero-top{ align-items:flex-start; gap:0.75rem; }
    .toolbar{ margin-left:1rem; margin-right:1rem; }
    main{ padding:0 1rem; }
    .cal-cell{ min-height:48px; }
    .cal-dow{ font-size:0.6rem; }
    .brand h1{ font-size:1.7rem; }

    .stat-chip{ min-width:75px; padding:0.5rem 0.75rem; }
    .activity-row{ flex-wrap:wrap; }
    .activity-hours{ min-width:2.5rem; }
    .modal{ padding:1.1rem; }
  }
</style>
</head>
<body>
  <div class="app">
    <header class="hero">
      <div class="hero-top">
        <div class="brand">
          <span class="brand-eyebrow">AUBURN, ALABAMA</span>
          <h1>The Plains Planner</h1>
        </div>
        <div style="display:flex; flex-direction:column; align-items:flex-end; gap:0.5rem;">
          <nav class="tabs" id="tabs">
            <button class="tab active" data-tab="week">This Week</button>
            <button class="tab" data-tab="free">Free Time</button>
            <button class="tab" data-tab="clubs">Clubs</button>
            <button class="tab" data-tab="calendar">Calendar</button>
            <button class="tab" data-tab="schedule">Schedule</button>
            <button class="tab" data-tab="portfolio">Portfolio</button>
          </nav>
          <div class="hero-actions">
            <button class="hero-btn" id="exportBtn">↓ Export backup</button>
            <button class="hero-btn" id="importBtn">↑ Restore backup</button>
          </div>
        </div>
      </div>
      <div class="ticker">
        <div class="ticker-label">On Deck</div>
        <div class="ticker-track">
          <div class="ticker-content" id="tickerContent"></div>
        </div>
      </div>
    </header>

    <main id="main"></main>

    <footer style="
      text-align:center;
      padding:2rem 1.5rem 1.5rem;
      border-top:1px solid var(--line);
      margin-top:2.5rem;
    ">
      <p style="font-family:'JetBrains Mono',monospace; font-size:0.72rem; letter-spacing:0.1em; text-transform:uppercase; color:var(--ink-soft); margin:0 0 0.6rem;">
        Built for Auburn students
      </p>
      <button id="shareBtn" style="
        background:var(--navy);
        color:var(--cream);
        border:none;
        border-radius:999px;
        padding:0.55rem 1.25rem;
        font-family:'JetBrains Mono',monospace;
        font-size:0.78rem;
        letter-spacing:0.06em;
        text-transform:uppercase;
        cursor:pointer;
        transition:background 0.15s;
      ">Share this app</button>
      <p id="shareFeedback" style="margin:0.5rem 0 0; font-size:0.8rem; color:var(--good); display:none;">Link copied to clipboard!</p>
    </footer>
  </div>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="modal"></div>
  </div>

<script>
  // ---------------------------------------------------------------
  // Data
  // ---------------------------------------------------------------
  const STORAGE_KEY = 'plains-planner-v1';

  const CATEGORIES = [
    'Academic & Honors',
    'Arts & Performance',
    'Cultural & Identity',
    'Greek Life',
    'Health & Wellness',
    'Political & Civic',
    'Professional & Pre-Professional',
    'Recreation & Sports Clubs',
    'Religious & Faith-Based',
    'Service & Philanthropy',
    'Special Interest',
    'Other'
  ];

  const CATEGORY_COLORS = {
    'Academic & Honors': '#5b7c99',
    'Arts & Performance': '#a8577e',
    'Cultural & Identity': '#c9a227',
    'Greek Life': '#dd550c',
    'Health & Wellness': '#5e8c61',
    'Political & Civic': '#6b6358',
    'Professional & Pre-Professional': '#0b2341',
    'Recreation & Sports Clubs': '#e0843a',
    'Religious & Faith-Based': '#7d6b9e',
    'Service & Philanthropy': '#3f7a6b',
    'Special Interest': '#b3402c',
    'Other': '#8a8275'
  };

  const ACTIVITY_CATEGORIES = [
    'Shadowing / Clinical',
    'Volunteering',
    'Research',
    'Leadership',
    'Professional Development',
    'Community Service',
    'Other'
  ];

  const ACTIVITY_CATEGORY_COLORS = {
    'Shadowing / Clinical': '#5b7c99',
    'Volunteering':         '#3f7a6b',
    'Research':             '#7d6b9e',
    'Leadership':           '#dd550c',
    'Professional Development': '#0b2341',
    'Community Service':    '#5e8c61',
    'Other':                '#8a8275'
  };

  // A small curated palette students can pick from to give each club its
  // own accent color across cards, calendar dots, and the weekly digest.
  const COLOR_PALETTE = [
    '#dd550c', '#0b2341', '#3f7a6b', '#c9a227', '#a8577e',
    '#5b7c99', '#e0843a', '#7d6b9e', '#5e8c61', '#b3402c', '#6b6358'
  ];

  // Returns the accent color for a given club id, falling back to the
  // club's category color, then a neutral default for general events.
  function getClubColor(clubId){
    if (!clubId) return 'var(--orange)';
    const club = clubById(clubId);
    if (!club) return 'var(--orange)';
    return club.color || CATEGORY_COLORS[club.category] || CATEGORY_COLORS['Other'];
  }

  let data = { clubs: [], events: [], recurringEvents: [] };

  let ui = {
    tab: 'week',
    search: '',
    category: 'all',
    followingOnly: false,
    calYear: new Date().getFullYear(),
    calMonth: new Date().getMonth(), // 0-indexed
    selectedDay: null
  };

  function pad(n){ return String(n).padStart(2,'0'); }
  function isoDate(y,m,d){ return `${y}-${pad(m+1)}-${pad(d)}`; }
  function todayIso(){
    const t = new Date();
    return isoDate(t.getFullYear(), t.getMonth(), t.getDate());
  }
  function uid(){ return Math.random().toString(36).slice(2,10); }

  function seedData(){
    return {
      clubs: [],
      events: [],
      recurringEvents: [],
      activities: []
    };
  }

  // ---------------------------------------------------------------
  // Storage
  // ---------------------------------------------------------------
  async function loadData(){
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw){
        data = JSON.parse(raw);
        if (!Array.isArray(data.recurringEvents)) data.recurringEvents = [];
        if (!Array.isArray(data.clubs)) data.clubs = [];
        if (!Array.isArray(data.events)) data.events = [];
        if (!Array.isArray(data.activities)) data.activities = [];
        return;
      }
    }catch(e){
      // storage unavailable or corrupted -> seed
    }
    data = seedData();
    await persist();
  }

  async function persist(){
    try{
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }catch(e){
      console.error('Could not save data', e);
    }
  }

  // ---------------------------------------------------------------
  // Helpers
  // ---------------------------------------------------------------
  function clubById(id){ return data.clubs.find(c => c.id === id); }

  function formatDateLabel(iso){
    const [y,m,d] = iso.split('-').map(Number);
    const date = new Date(y, m-1, d);
    return date.toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric' });
  }

  function formatTimeLabel(time){
    if (!time) return '';
    const [h,m] = time.split(':').map(Number);
    const ampm = h >= 12 ? 'PM' : 'AM';
    const hour12 = ((h + 11) % 12) + 1;
    return `${hour12}:${pad(m)} ${ampm}`;
  }

  // ---------------------------------------------------------------
  // Free time helpers
  // ---------------------------------------------------------------
  const FREE_TIME_START = '08:00';
  const FREE_TIME_END = '23:00';
  const MIN_FREE_BLOCK_MINUTES = 30;
  const DEFAULT_EVENT_DURATION_MINUTES = 60;

  function timeToMinutes(time){
    if (!time) return null;
    const [h,m] = time.split(':').map(Number);
    return h*60 + m;
  }

  function minutesToTimeStr(mins){
    const h = Math.floor(mins/60);
    const m = mins%60;
    return `${pad(h)}:${pad(m)}`;
  }

  function formatDuration(mins){
    const h = Math.floor(mins/60);
    const m = mins%60;
    if (h && m) return `${h}h ${m}m`;
    if (h) return `${h}h`;
    return `${m}m`;
  }

  // Computes open gaps between FREE_TIME_START and FREE_TIME_END for a
  // given date, based on items with a start time (and optional end time).
  function freeBlocksForDate(iso){
    const dayStart = timeToMinutes(FREE_TIME_START);
    const dayEnd = timeToMinutes(FREE_TIME_END);
    const occ = occurrencesForDate(iso);

    const busy = [];
    let untimedCount = 0;
    occ.forEach(e => {
      const start = timeToMinutes(e.time);
      if (start === null){ untimedCount++; return; }
      let end = e.endTime ? timeToMinutes(e.endTime) : start + DEFAULT_EVENT_DURATION_MINUTES;
      if (end <= start) end = start + DEFAULT_EVENT_DURATION_MINUTES;
      const s = Math.max(start, dayStart);
      const en = Math.min(end, dayEnd);
      if (en > s) busy.push([s, en]);
    });

    busy.sort((a,b) => a[0]-b[0]);
    const merged = [];
    busy.forEach(([s,e]) => {
      if (merged.length && s <= merged[merged.length-1][1]){
        merged[merged.length-1][1] = Math.max(merged[merged.length-1][1], e);
      } else {
        merged.push([s,e]);
      }
    });

    const gaps = [];
    let cursor = dayStart;
    merged.forEach(([s,e]) => {
      if (s - cursor >= MIN_FREE_BLOCK_MINUTES) gaps.push([cursor, s]);
      cursor = Math.max(cursor, e);
    });
    if (dayEnd - cursor >= MIN_FREE_BLOCK_MINUTES) gaps.push([cursor, dayEnd]);

    return { gaps, untimedCount };
  }

  function daysUntil(iso){
    const [y,m,d] = iso.split('-').map(Number);
    const target = new Date(y, m-1, d);
    const t = new Date();
    const today = new Date(t.getFullYear(), t.getMonth(), t.getDate());
    return Math.round((target - today) / (1000*60*60*24));
  }

  function upcomingEvents(limit){
    const today = new Date();
    const results = [];
    for (let i = 0; i <= 90; i++){
      const d = new Date(today.getFullYear(), today.getMonth(), today.getDate() + i);
      const iso = isoDate(d.getFullYear(), d.getMonth(), d.getDate());
      occurrencesForDate(iso).forEach(o => results.push(o));
      if (results.length >= limit * 4 && i > 7) break;
    }
    return results
      .sort((a,b) => (a.date + (a.time||'')).localeCompare(b.date + (b.time||'')))
      .slice(0, limit);
  }

  const DOW_LABELS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

  function recurringMatchesDate(rec, iso){
    const [y,m,d] = iso.split('-').map(Number);
    const dow = new Date(y, m-1, d).getDay();
    if (!rec.daysOfWeek.includes(dow)) return false;
    if (rec.startDate && iso < rec.startDate) return false;
    if (rec.endDate && iso > rec.endDate) return false;
    return true;
  }

  // Returns one-off events and recurring-event occurrences for a given date,
  // in a unified shape so the calendar can render them together.
  function occurrencesForDate(iso){
    const oneOff = data.events
      .filter(e => e.date === iso)
      .map(e => ({ ...e, date: iso, kind: 'event' }));

    const recurring = data.recurringEvents
      .filter(r => recurringMatchesDate(r, iso))
      .map(r => ({
        id: r.id,
        title: r.title,
        date: iso,
        time: r.startTime,
        endTime: r.endTime,
        location: r.location,
        clubId: r.clubId,
        link: r.link,
        notes: r.notes,
        kind: 'recurring'
      }));

    return [...oneOff, ...recurring];
  }

  function formatDowList(daysOfWeek){
    const sorted = [...daysOfWeek].sort();
    return sorted.map(d => DOW_LABELS[d]).join(', ');
  }

  // ---------------------------------------------------------------
  // Render: ticker
  // ---------------------------------------------------------------
  function renderTicker(){
    const el = document.getElementById('tickerContent');
    if (!el) return;
    const items = upcomingEvents(6);
    if (items.length === 0){
      el.className = 'ticker-empty';
      el.innerHTML = 'Nothing on the board yet — add a club or event to get started.';
      return;
    }
    el.className = 'ticker-content';
    const pieces = items.map(e => {
      const diff = daysUntil(e.date);
      let label;
      if (diff === 0) label = 'TODAY';
      else if (diff === 1) label = '1 DAY';
      else label = `${diff} DAYS`;
      return `<span class="ticker-item"><span class="days">${label}</span>${escapeHtml(e.title)} · ${formatDateLabel(e.date)}</span>`;
    });
    // duplicate for seamless loop
    const html = pieces.join('') + pieces.join('');
    el.innerHTML = html;
  }

  function escapeHtml(str){
    if (!str) return '';
    return str.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
  }

  // ---------------------------------------------------------------
  // Render: main
  // ---------------------------------------------------------------
  function render(){
    document.querySelectorAll('.tab').forEach(t => {
      t.classList.toggle('active', t.dataset.tab === ui.tab);
    });
    renderTicker();
    if (ui.tab === 'week') renderWeek();
    else if (ui.tab === 'free') renderFreeTime();
    else if (ui.tab === 'clubs') renderClubs();
    else if (ui.tab === 'schedule') renderSchedule();
    else if (ui.tab === 'portfolio') renderPortfolio();
    else renderCalendar();
  }

  // ---------------------------------------------------------------
  // This Week digest
  // ---------------------------------------------------------------
  function renderWeek(){
    const main = document.getElementById('main');
    const todayDate = new Date();
    const today = todayIso();

    const days = [];
    for (let i = 0; i < 7; i++){
      const d = new Date(todayDate.getFullYear(), todayDate.getMonth(), todayDate.getDate() + i);
      days.push({
        iso: isoDate(d.getFullYear(), d.getMonth(), d.getDate()),
        date: d
      });
    }

    const rangeLabel = `${days[0].date.toLocaleDateString('en-US',{month:'short',day:'numeric'})} – ${days[6].date.toLocaleDateString('en-US',{month:'short',day:'numeric'})}`;

    main.innerHTML = `
      <div class="toolbar">
        <div style="flex:1;">
          <h3 style="font-size:1rem; margin-bottom:0.2rem;">This Week</h3>
          <p style="margin:0; color:var(--ink-soft); font-size:0.85rem;">${rangeLabel} · everything across your clubs, classes, and events</p>
        </div>
      </div>
      <div id="weekList"></div>
    `;

    const list = document.getElementById('weekList');
    list.innerHTML = days.map(day => {
      const occ = occurrencesForDate(day.iso).slice().sort((a,b) => (a.time||'').localeCompare(b.time||''));
      const isToday = day.iso === today;
      const dayLabel = day.date.toLocaleDateString('en-US', { weekday:'long', month:'short', day:'numeric' });

      const rows = occ.length === 0
        ? `<p class="week-empty">Nothing scheduled.</p>`
        : occ.map(e => {
            const club = e.clubId ? clubById(e.clubId) : null;
            const color = getClubColor(e.clubId);
            const isRecurring = e.kind === 'recurring';
            const timeRange = isRecurring && e.endTime
              ? `${formatTimeLabel(e.time)} – ${formatTimeLabel(e.endTime)}`
              : (formatTimeLabel(e.time) || 'No time set');
            return `
              <div class="week-event">
                <span class="event-dot" style="background:${color}; margin-top:0.35rem;"></span>
                <div class="week-event-main">
                  <div class="week-event-title">${escapeHtml(e.title)}${isRecurring ? '<span class="recur-tag">Weekly</span>' : ''}</div>
                  <div class="event-sub">${timeRange}${e.location ? ' · ' + escapeHtml(e.location) : ''}${club ? ' · ' + escapeHtml(club.name) : ''}</div>
                </div>
              </div>
            `;
          }).join('');

      return `
        <div class="week-day ${isToday ? 'is-today' : ''}">
          <div class="week-day-header">
            <h3>${dayLabel}${isToday ? '<span class="today-pill" style="margin-left:0.5rem;">Today</span>' : ''}</h3>
            <button class="week-add" data-iso="${day.iso}">+ Add</button>
          </div>
          ${rows}
        </div>
      `;
    }).join('');

    list.querySelectorAll('.week-add').forEach(btn => {
      btn.addEventListener('click', () => openEventModal(null, btn.dataset.iso));
    });
  }

  // ---------------------------------------------------------------
  // Free Time finder
  // ---------------------------------------------------------------
  function renderFreeTime(){
    const main = document.getElementById('main');
    const todayDate = new Date();
    const today = todayIso();

    const days = [];
    for (let i = 0; i < 7; i++){
      const d = new Date(todayDate.getFullYear(), todayDate.getMonth(), todayDate.getDate() + i);
      days.push({
        iso: isoDate(d.getFullYear(), d.getMonth(), d.getDate()),
        date: d
      });
    }

    const rangeLabel = `${days[0].date.toLocaleDateString('en-US',{month:'short',day:'numeric'})} – ${days[6].date.toLocaleDateString('en-US',{month:'short',day:'numeric'})}`;

    main.innerHTML = `
      <div class="toolbar">
        <div style="flex:1;">
          <h3 style="font-size:1rem; margin-bottom:0.2rem;">Free Time</h3>
          <p style="margin:0; color:var(--ink-soft); font-size:0.85rem;">${rangeLabel} · open blocks between ${formatTimeLabel(FREE_TIME_START)} and ${formatTimeLabel(FREE_TIME_END)}</p>
        </div>
      </div>
      <div id="freeList"></div>
    `;

    const list = document.getElementById('freeList');
    list.innerHTML = days.map(day => {
      const { gaps, untimedCount } = freeBlocksForDate(day.iso);
      const isToday = day.iso === today;
      const dayLabel = day.date.toLocaleDateString('en-US', { weekday:'long', month:'short', day:'numeric' });

      const rows = gaps.length === 0
        ? `<p class="week-empty">No open blocks of ${MIN_FREE_BLOCK_MINUTES}+ minutes today.</p>`
        : gaps.map(([s,e]) => {
            return `
              <div class="week-event">
                <span class="event-dot" style="background:var(--good); margin-top:0.35rem;"></span>
                <div class="week-event-main">
                  <div class="week-event-title">${formatTimeLabel(minutesToTimeStr(s))} – ${formatTimeLabel(minutesToTimeStr(e))}</div>
                  <div class="event-sub">${formatDuration(e-s)} free</div>
                </div>
              </div>
            `;
          }).join('');

      const note = untimedCount > 0
        ? `<p class="week-empty" style="margin-top:0.4rem;">${untimedCount} item${untimedCount > 1 ? 's' : ''} without a set time not included above.</p>`
        : '';

      return `
        <div class="week-day ${isToday ? 'is-today' : ''}">
          <div class="week-day-header">
            <h3>${dayLabel}${isToday ? '<span class="today-pill" style="margin-left:0.5rem;">Today</span>' : ''}</h3>
          </div>
          ${rows}
          ${note}
        </div>
      `;
    }).join('');
  }


  function renderClubs(){
    const main = document.getElementById('main');

    const categoryOptions = ['<option value="all">All categories</option>']
      .concat(CATEGORIES.map(c => `<option value="${c}" ${ui.category===c?'selected':''}>${c}</option>`))
      .join('');

    main.innerHTML = `
      <div class="toolbar">
        <input type="text" id="searchInput" placeholder="Search your clubs..." value="${escapeHtml(ui.search)}">
        <select id="categoryFilter">${categoryOptions}</select>
        <label class="toggle-pill">
          <input type="checkbox" id="followingToggle" ${ui.followingOnly?'checked':''}>
          Following only
        </label>
        <button class="btn-primary" id="addClubBtn">+ Add club</button>
      </div>
      <div class="grid" id="clubsGrid"></div>
    `;

    document.getElementById('searchInput').addEventListener('input', e => {
      ui.search = e.target.value;
      renderClubsGrid();
    });
    document.getElementById('categoryFilter').addEventListener('change', e => {
      ui.category = e.target.value;
      renderClubsGrid();
    });
    document.getElementById('followingToggle').addEventListener('change', e => {
      ui.followingOnly = e.target.checked;
      renderClubsGrid();
    });
    document.getElementById('addClubBtn').addEventListener('click', () => openClubModal(null));

    renderClubsGrid();
  }

  // Re-renders just the club cards, leaving the search/filter toolbar
  // (and its focus state) untouched.
  function renderClubsGrid(){
    const grid = document.getElementById('clubsGrid');
    const search = ui.search.trim().toLowerCase();

    let clubs = data.clubs.filter(c => {
      if (ui.followingOnly && !c.following) return false;
      if (ui.category !== 'all' && c.category !== ui.category) return false;
      if (search){
        const hay = `${c.name} ${c.category} ${c.notes}`.toLowerCase();
        if (!hay.includes(search)) return false;
      }
      return true;
    });

    clubs = clubs.slice().sort((a,b) => {
      if (a.following !== b.following) return a.following ? -1 : 1;
      return a.name.localeCompare(b.name);
    });

    if (clubs.length === 0){
      grid.innerHTML = `
        <div class="empty">
          <h3>No clubs here yet</h3>
          <p>Add the organizations you're following on AuInvolve to start building your board.</p>
          <button class="btn-primary" id="emptyAddClub">+ Add club</button>
        </div>`;
      document.getElementById('emptyAddClub').addEventListener('click', () => openClubModal(null));
      return;
    }

    grid.innerHTML = clubs.map(c => {
      const categoryColor = CATEGORY_COLORS[c.category] || CATEGORY_COLORS['Other'];
      const accentColor = getClubColor(c.id);
      return `
        <div class="card" data-id="${c.id}" style="border-left:4px solid ${accentColor};">
          <div class="card-top">
            <span class="tag" style="background:${categoryColor}">${escapeHtml(c.category)}</span>
            <button class="star-btn ${c.following?'active':''}" data-action="star" title="${c.following?'Stop following':'Follow'}">★</button>
          </div>
          <h3>${escapeHtml(c.name)}</h3>
          ${c.meetingInfo ? `<p class="meta">${escapeHtml(c.meetingInfo)}</p>` : ''}
          ${c.notes ? `<p class="notes">${escapeHtml(c.notes)}</p>` : ''}
          <div class="card-actions">
            ${c.link ? `<a href="${escapeHtml(c.link)}" target="_blank" rel="noopener">Open in AuInvolve →</a>` : '<span></span>'}
            <div class="right">
              <button class="btn-text" data-action="edit">Edit</button>
              <button class="btn-text danger" data-action="delete">Delete</button>
            </div>
          </div>
        </div>
      `;
    }).join('');

    grid.querySelectorAll('.card').forEach(card => {
      const id = card.dataset.id;
      card.querySelector('[data-action="star"]').addEventListener('click', () => {
        const club = clubById(id);
        club.following = !club.following;
        persist();
        renderClubsGrid();
      });
      card.querySelector('[data-action="edit"]').addEventListener('click', () => openClubModal(clubById(id)));
      card.querySelector('[data-action="delete"]').addEventListener('click', () => {
        openConfirmModal(
          `Delete "${clubById(id).name}"?`,
          'This also removes the club link from any events that reference it.',
          () => {
            data.clubs = data.clubs.filter(c => c.id !== id);
            data.events.forEach(e => { if (e.clubId === id) e.clubId = null; });
            persist();
            renderClubsGrid();
            renderTicker();
          }
        );
      });
    });
  }

  // ---------------------------------------------------------------
  // Calendar view
  // ---------------------------------------------------------------
  function buildCalendarCells(year, month){
    const firstDay = new Date(year, month, 1);
    const startWeekday = firstDay.getDay();
    const daysInMonth = new Date(year, month+1, 0).getDate();
    const daysInPrevMonth = new Date(year, month, 0).getDate();

    const cells = [];
    for (let i = startWeekday - 1; i >= 0; i--){
      const day = daysInPrevMonth - i;
      let y = year, m = month - 1;
      if (m < 0){ m = 11; y -= 1; }
      cells.push({ day, current:false, iso: isoDate(y,m,day) });
    }
    for (let d = 1; d <= daysInMonth; d++){
      cells.push({ day:d, current:true, iso: isoDate(year, month, d) });
    }
    let nextDay = 1;
    while (cells.length % 7 !== 0){
      let y = year, m = month + 1;
      if (m > 11){ m = 0; y += 1; }
      cells.push({ day: nextDay, current:false, iso: isoDate(y,m,nextDay) });
      nextDay++;
    }
    return cells;
  }

  function renderCalendar(){
    const main = document.getElementById('main');
    const monthName = new Date(ui.calYear, ui.calMonth, 1).toLocaleDateString('en-US', { month:'long', year:'numeric' });

    main.innerHTML = `
      <div class="cal-header">
        <div class="cal-nav">
          <button id="prevMonth" aria-label="Previous month">‹</button>
          <h2 id="calTitle">${monthName}</h2>
          <button id="nextMonth" aria-label="Next month">›</button>
        </div>
        <button class="btn-primary" id="addEventBtn">+ Add event</button>
      </div>
      <div class="cal-grid" id="calGrid"></div>
      <div class="day-panel" id="dayPanel"></div>
    `;

    document.getElementById('prevMonth').addEventListener('click', () => {
      ui.calMonth -= 1;
      if (ui.calMonth < 0){ ui.calMonth = 11; ui.calYear -= 1; }
      ui.selectedDay = null;
      renderCalendar();
      renderTicker();
    });
    document.getElementById('nextMonth').addEventListener('click', () => {
      ui.calMonth += 1;
      if (ui.calMonth > 11){ ui.calMonth = 0; ui.calYear += 1; }
      ui.selectedDay = null;
      renderCalendar();
      renderTicker();
    });
    document.getElementById('addEventBtn').addEventListener('click', () => {
      openEventModal(null, ui.selectedDay || todayIso());
    });

    const cells = buildCalendarCells(ui.calYear, ui.calMonth);
    const today = todayIso();
    const dows = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

    const grid = document.getElementById('calGrid');
    grid.innerHTML =
      dows.map(d => `<div class="cal-dow">${d}</div>`).join('') +
      cells.map(cell => {
        const classes = ['cal-cell'];
        if (!cell.current) classes.push('outside');
        if (cell.iso === today) classes.push('today');
        if (cell.iso === ui.selectedDay) classes.push('selected');
        const dots = occurrencesForDate(cell.iso).slice(0,4)
          .map(o => `<span class="cal-dot" style="background:${getClubColor(o.clubId)}"></span>`).join('');
        return `
          <button class="${classes.join(' ')}" data-iso="${cell.iso}">
            <span class="cal-daynum">${cell.day}</span>
            <span class="cal-dots">${dots}</span>
          </button>
        `;
      }).join('');

    grid.querySelectorAll('.cal-cell').forEach(cell => {
      cell.addEventListener('click', () => {
        ui.selectedDay = cell.dataset.iso;
        renderCalendar();
      });
    });

    renderDayPanel();
  }

  function renderDayPanel(){
    const panel = document.getElementById('dayPanel');

    if (!selected){
      panel.innerHTML = `<h3>Pick a day to see what's on it</h3><p style="color:var(--ink-soft); font-size:0.9rem; margin:0;">Click any date above, or add an event directly.</p>`;
      return;
    }

    const events = occurrencesForDate(selected).slice().sort((a,b) => (a.time||'').localeCompare(b.time||''));
    const label = formatDateLabel(selected);

    if (events.length === 0){
      panel.innerHTML = `
        <h3>${label}</h3>
        <p style="color:var(--ink-soft); font-size:0.9rem;">Nothing on the books for this day.</p>
        <button class="btn-secondary" id="dayAddEvent">+ Add event for ${label}</button>
      `;
      document.getElementById('dayAddEvent').addEventListener('click', () => openEventModal(null, selected));
      return;
    }

    panel.innerHTML = `<h3>${label}</h3>` + events.map(e => {
      const club = e.clubId ? clubById(e.clubId) : null;
      const isRecurring = e.kind === 'recurring';
      const color = getClubColor(e.clubId);
      const timeRange = isRecurring && e.endTime
        ? `${formatTimeLabel(e.time)} – ${formatTimeLabel(e.endTime)}`
        : (formatTimeLabel(e.time) || 'No time set');
      return `
        <div class="event-row" data-id="${e.id}" data-kind="${e.kind}">
          <div class="event-main">
            <div class="event-title"><span class="event-dot" style="background:${color};"></span>${escapeHtml(e.title)}${isRecurring ? '<span class="recur-tag">Weekly</span>' : ''}</div>
            <div class="event-sub">${timeRange}${e.location ? ' · ' + escapeHtml(e.location) : ''}${club ? ' · ' + escapeHtml(club.name) : ''}</div>
            ${e.notes ? `<div class="event-notes">${escapeHtml(e.notes)}</div>` : ''}

          </div>
        </div>
      `;
    }).join('') + `<div style="margin-top:0.9rem;"><button class="btn-secondary" id="dayAddEvent">+ Add another event</button></div>`;

    panel.querySelectorAll('.event-row').forEach(row => {
      const id = row.dataset.id;
      const kind = row.dataset.kind;
      row.querySelector('[data-action="edit"]').addEventListener('click', () => {
        if (kind === 'recurring'){
          openRecurringModal(data.recurringEvents.find(r => r.id === id));
        } else {
          openEventModal(data.events.find(e => e.id === id), selected);
        }
      });
      row.querySelector('[data-action="delete"]').addEventListener('click', () => {
        if (kind === 'recurring'){
          const rec = data.recurringEvents.find(r => r.id === id);
          openConfirmModal(
            `Delete "${rec.title}"?`,
            'This is a recurring item — deleting it removes every occurrence, not just this day.',
            () => {
              data.recurringEvents = data.recurringEvents.filter(r => r.id !== id);
              persist();
              render();
            }
          );
        } else {
          const ev = data.events.find(e => e.id === id);
          openConfirmModal(`Delete "${ev.title}"?`, 'This cannot be undone.', () => {
            data.events = data.events.filter(e => e.id !== id);
            persist();
            render();
          });
        }
      });
    });
    document.getElementById('dayAddEvent').addEventListener('click', () => openEventModal(null, selected));
  }

      rec.startDate = document.getElementById('r-start-date').value || '';
      rec.endDate = document.getElementById('r-end-date').value || '';
      rec.link = document.getElementById('r-link').value.trim();
      rec.notes = document.getElementById('r-notes').value.trim();

      if (!isEdit) data.recurringEvents.push(rec);
      persist();
      closeModal();
      render();
    });

    overlay.classList.add('open');
    document.getElementById('r-title').focus();
  }

  function openConfirmModal(title, body, onConfirm){
    modal.innerHTML = `
      <h2>${escapeHtml(title)}</h2>
      <p style="color:var(--ink-soft); margin-bottom:1.2rem;">${escapeHtml(body)}</p>
      <div class="modal-actions">
        <button class="btn-secondary" id="cancelBtn">Cancel</button>
        <button class="btn-primary" id="confirmBtn" style="background:var(--danger);">Delete</button>
      </div>
    `;
    document.getElementById('cancelBtn').addEventListener('click', closeModal);
    document.getElementById('confirmBtn').addEventListener('click', () => {
      closeModal();
      onConfirm();
    });
    overlay.classList.add('open');
  }

  // ---------------------------------------------------------------
  // Portfolio
  // ---------------------------------------------------------------
  function totalHoursForClub(clubId){
    return data.activities
      .filter(a => a.clubId === clubId)
      .reduce((sum, a) => sum + (parseFloat(a.hours) || 0), 0);
  }

  function renderPortfolio(){
    const main = document.getElementById('main');

    const totalHours = data.activities.reduce((s, a) => s + (parseFloat(a.hours) || 0), 0);
    const orgsWithRole = data.clubs.filter(c => c.role || c.memberSince || c.orgDescription);

    main.innerHTML = `
      <div class="toolbar">
        <div style="flex:1;">
          <h3 style="font-size:1rem; margin-bottom:0.2rem;">Involvement Portfolio</h3>
          <p style="margin:0; color:var(--ink-soft); font-size:0.85rem;">Track your roles, hours, and experiences across every org.</p>
        </div>
        <button class="btn-secondary" id="exportPortfolioBtn">↓ Export as text</button>
        <button class="btn-primary" id="logActivityBtn">+ Log activity</button>
      </div>

      <div class="portfolio-stats">
        <div class="stat-chip">
          <span class="stat-num">${data.clubs.length}</span>
          <span class="stat-label">Orgs</span>
        </div>
        <div class="stat-chip">
          <span class="stat-num">${data.activities.length}</span>
          <span class="stat-label">Activities</span>
        </div>
        <div class="stat-chip">
          <span class="stat-num">${totalHours % 1 === 0 ? totalHours : totalHours.toFixed(1)}</span>
          <span class="stat-label">Total hrs</span>
        </div>
      </div>

      <div style="margin-bottom:1.5rem;">
        <p class="portfolio-section-title">Organizations</p>
        <div id="portfolioOrgs"></div>
      </div>

      <div>
        <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:0.6rem;">
          <p class="portfolio-section-title" style="margin:0; border:none;">Activity Log</p>
          <select id="activityClubFilter" style="font-size:0.8rem; padding:0.3rem 0.5rem; border:1px solid var(--line); border-radius:6px; background:#fff;">
            <option value="all">All orgs</option>
            <option value="none">No org linked</option>
            ${data.clubs.map(c => `<option value="${c.id}">${escapeHtml(c.name)}</option>`).join('')}
          </select>
        </div>
        <div id="activityLog"></div>
      </div>
    `;

    document.getElementById('logActivityBtn').addEventListener('click', () => openActivityModal(null));
    document.getElementById('exportPortfolioBtn').addEventListener('click', exportPortfolio);
    document.getElementById('activityClubFilter').addEventListener('change', e => {
      renderActivityLog(e.target.value);
    });

    renderPortfolioOrgs();
    renderActivityLog('all');
  }

  function renderPortfolioOrgs(){
    const container = document.getElementById('portfolioOrgs');
    if (!container) return;
    const clubs = data.clubs.slice().sort((a,b) => a.name.localeCompare(b.name));

    if (clubs.length === 0){
      container.innerHTML = `<p style="color:var(--ink-soft); font-size:0.9rem;">No clubs added yet. Add clubs from the Clubs tab and fill in your role to see them here.</p>`;
      return;
    }

    container.innerHTML = clubs.map(c => {
      const color = getClubColor(c.id);
      const hrs = totalHoursForClub(c.id);
      const since = c.memberSince ? formatDateLabel(c.memberSince) : null;
      return `
        <div class="org-portfolio-card">
          <div class="org-portfolio-accent" style="background:${color};"></div>
          <div class="org-portfolio-body">
            <div style="display:flex; justify-content:space-between; align-items:flex-start; gap:0.5rem; flex-wrap:wrap;">
              <div>
                <h3 style="font-size:1.05rem;">${escapeHtml(c.name)}</h3>
                ${c.role ? `<div class="org-portfolio-role">${escapeHtml(c.role)}</div>` : ''}
                ${since ? `<div class="activity-meta">Since ${since}</div>` : ''}
              </div>
              ${hrs > 0 ? `<div class="stat-chip" style="min-width:unset; padding:0.4rem 0.75rem;"><span class="stat-num" style="font-size:1.1rem;">${hrs % 1 === 0 ? hrs : hrs.toFixed(1)}</span><span class="stat-label">hrs logged</span></div>` : ''}
            </div>
            ${c.orgDescription ? `<p style="margin:0.4rem 0 0; font-size:0.88rem;">${escapeHtml(c.orgDescription)}</p>` : ''}
          </div>
        </div>
      `;
    }).join('');
  }

  function renderActivityLog(clubFilter){
    const container = document.getElementById('activityLog');
    if (!container) return;

    let activities = data.activities.slice().sort((a,b) => (b.date||'').localeCompare(a.date||''));

    if (clubFilter === 'none') activities = activities.filter(a => !a.clubId);
    else if (clubFilter !== 'all') activities = activities.filter(a => a.clubId === clubFilter);

    if (activities.length === 0){
      container.innerHTML = `
        <div class="empty" style="margin-top:0;">
          <h3>No activities logged yet</h3>
          <p>Use "+ Log activity" to record hours, shadowing, volunteer work, research, and more.</p>
        </div>`;
      return;
    }

    container.innerHTML = activities.map(a => {
      const club = a.clubId ? clubById(a.clubId) : null;
      const catColor = ACTIVITY_CATEGORY_COLORS[a.category] || ACTIVITY_CATEGORY_COLORS['Other'];
      return `
        <div class="activity-row" data-id="${a.id}">
          <div class="activity-hours">
            ${parseFloat(a.hours) || 0}
            <span>hrs</span>
          </div>
          <div class="activity-body">
            <div class="activity-title">
              <span class="act-cat-tag" style="background:${catColor}20; color:${catColor};">${escapeHtml(a.category)}</span>
              ${escapeHtml(a.title)}
            </div>
            <div class="activity-meta">
              ${a.date ? formatDateLabel(a.date) : ''}${a.with ? ' · ' + escapeHtml(a.with) : ''}${club ? ' · ' + escapeHtml(club.name) : ''}
            </div>
            ${a.description ? `<div class="activity-desc">${escapeHtml(a.description)}</div>` : ''}
          </div>
          <div class="event-actions">
            <button class="btn-text" data-action="edit">Edit</button>
            <button class="btn-text danger" data-action="delete">Delete</button>
          </div>
        </div>
      `;
    }).join('');

    container.querySelectorAll('.activity-row').forEach(row => {
      const id = row.dataset.id;
      row.querySelector('[data-action="edit"]').addEventListener('click', () => {
        openActivityModal(data.activities.find(a => a.id === id));
      });
      row.querySelector('[data-action="delete"]').addEventListener('click', () => {
        const act = data.activities.find(a => a.id === id);
        openConfirmModal(`Delete "${act.title}"?`, 'This cannot be undone.', () => {
          data.activities = data.activities.filter(a => a.id !== id);
          persist();
          renderPortfolio();
        });
      });
    });
  }

  function openActivityModal(existing){
    const isEdit = !!existing;
    const act = existing || {
      id: uid(), title:'', category: ACTIVITY_CATEGORIES[0],
      date: todayIso(), hours:'', with:'', clubId:null, description:''
    };

    const clubOptions = ['<option value="">No org linked</option>']
      .concat(data.clubs.map(c => `<option value="${c.id}" ${c.id===act.clubId?'selected':''}>${escapeHtml(c.name)}</option>`))
      .join('');

    const catOptions = ACTIVITY_CATEGORIES
      .map(c => `<option value="${c}" ${c===act.category?'selected':''}>${c}</option>`)
      .join('');

    modal.innerHTML = `
      <h2>${isEdit ? 'Edit activity' : 'Log activity'}</h2>
      <div class="field">
        <label for="a-title">Title</label>
        <input id="a-title" type="text" value="${escapeHtml(act.title)}" placeholder="e.g. Shadowing Dr. Patel, Habitat build day">
      </div>
      <div class="field">
        <label for="a-category">Category</label>
        <select id="a-category">${catOptions}</select>
      </div>
      <div class="field-row">
        <div class="field">
          <label for="a-date">Date</label>
          <input id="a-date" type="date" value="${act.date||''}">
        </div>
        <div class="field">
          <label for="a-hours">Hours</label>
          <input id="a-hours" type="number" min="0" step="0.5" value="${act.hours||''}" placeholder="e.g. 3.5">
        </div>
      </div>
      <div class="field">
        <label for="a-with">With / At</label>
        <input id="a-with" type="text" value="${escapeHtml(act.with||'')}" placeholder="e.g. Dr. Smith · UAB Hospital, Food Bank of Alabama">
      </div>
      <div class="field">
        <label for="a-club">Linked org</label>
        <select id="a-club">${clubOptions}</select>
      </div>
      <div class="field">
        <label for="a-desc">Description</label>
        <textarea id="a-desc" placeholder="What did you do? What did you learn?">${escapeHtml(act.description||'')}</textarea>
      </div>
      <div class="modal-actions">
        <button class="btn-secondary" id="cancelBtn">Cancel</button>
        <button class="btn-primary" id="saveBtn">${isEdit ? 'Save changes' : 'Log activity'}</button>
      </div>
    `;

    document.getElementById('cancelBtn').addEventListener('click', closeModal);
    document.getElementById('saveBtn').addEventListener('click', () => {
      const title = document.getElementById('a-title').value.trim();
      if (!title){ document.getElementById('a-title').focus(); return; }

      act.title       = title;
      act.category    = document.getElementById('a-category').value;
      act.date        = document.getElementById('a-date').value;
      act.hours       = document.getElementById('a-hours').value;
      act.with        = document.getElementById('a-with').value.trim();
      act.clubId      = document.getElementById('a-club').value || null;
      act.description = document.getElementById('a-desc').value.trim();

      if (!isEdit) data.activities.push(act);
      persist();
      closeModal();
      if (ui.tab === 'portfolio') renderPortfolio();
    });

    overlay.classList.add('open');
    document.getElementById('a-title').focus();
  }

  function exportPortfolio(){
    const lines = [];
    const now = new Date().toLocaleDateString('en-US', { month:'long', day:'numeric', year:'numeric' });

    lines.push('THE PLAINS PLANNER — INVOLVEMENT PORTFOLIO');
    lines.push(`Auburn University · Exported ${now}`);
    lines.push('');

    const totalHours = data.activities.reduce((s, a) => s + (parseFloat(a.hours) || 0), 0);
    lines.push(`${data.clubs.length} organization${data.clubs.length !== 1 ? 's' : ''} · ${data.activities.length} activities · ${totalHours % 1 === 0 ? totalHours : totalHours.toFixed(1)} total hours`);
    lines.push('');
    lines.push('═'.repeat(52));

    if (data.clubs.length > 0){
      lines.push('');
      lines.push('ORGANIZATIONS');
      lines.push('─'.repeat(52));
      data.clubs.slice().sort((a,b) => a.name.localeCompare(b.name)).forEach(c => {
        lines.push('');
        lines.push(c.name.toUpperCase());
        if (c.role) lines.push(`  Role: ${c.role}`);
        if (c.memberSince) lines.push(`  Since: ${formatDateLabel(c.memberSince)}`);
        const hrs = totalHoursForClub(c.id);
        if (hrs > 0) lines.push(`  Hours logged: ${hrs % 1 === 0 ? hrs : hrs.toFixed(1)}`);
        if (c.orgDescription) lines.push(`  ${c.orgDescription}`);
      });
    }

    if (data.activities.length > 0){
      lines.push('');
      lines.push('');
      lines.push('ACTIVITY LOG');
      lines.push('─'.repeat(52));

      const byCategory = {};
      data.activities.forEach(a => {
        if (!byCategory[a.category]) byCategory[a.category] = [];
        byCategory[a.category].push(a);
      });

      ACTIVITY_CATEGORIES.forEach(cat => {
        if (!byCategory[cat] || byCategory[cat].length === 0) return;
        lines.push('');
        lines.push(cat.toUpperCase());
        byCategory[cat]
          .slice()
          .sort((a,b) => (b.date||'').localeCompare(a.date||''))
          .forEach(a => {
            const club = a.clubId ? clubById(a.clubId) : null;
            lines.push('');
            lines.push(`  ${a.title}${a.hours ? ' (' + a.hours + ' hrs)' : ''}`);
            const meta = [a.date ? formatDateLabel(a.date) : null, a.with || null, club ? club.name : null].filter(Boolean);
            if (meta.length) lines.push(`  ${meta.join(' · ')}`);
            if (a.description) lines.push(`  "${a.description}"`);
          });
      });
    }

    lines.push('');
    lines.push('─'.repeat(52));
    lines.push('Generated by The Plains Planner');

    const blob = new Blob([lines.join('\n')], { type: 'text/plain' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `plains-planner-portfolio-${todayIso()}.txt`;
    a.click();
    URL.revokeObjectURL(url);
  }

  // ---------------------------------------------------------------
  // Export / Import
  // ---------------------------------------------------------------
  function exportData(){
    const json = JSON.stringify(data, null, 2);
    const blob = new Blob([json], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `plains-planner-backup-${todayIso()}.json`;
    a.click();
    URL.revokeObjectURL(url);
  }

  function importData(){
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = '.json,application/json';
    input.addEventListener('change', async () => {
      const file = input.files[0];
      if (!file) return;
      try {
        const text = await file.text();
        const parsed = JSON.parse(text);
        if (!Array.isArray(parsed.clubs) || !Array.isArray(parsed.events) || !Array.isArray(parsed.recurringEvents)){
          alert("That doesn't look like a Plains Planner backup file.");
          return;
        }
        openConfirmModal(
          'Restore backup?',
          `This will replace all your current data (${data.clubs.length} club${data.clubs.length !== 1 ? 's' : ''}, ${data.events.length} event${data.events.length !== 1 ? 's' : ''}, ${data.recurringEvents.length} recurring item${data.recurringEvents.length !== 1 ? 's' : ''}) with the backup. This cannot be undone.`,
          async () => {
            data = {
              clubs: parsed.clubs,
              events: parsed.events,
              recurringEvents: parsed.recurringEvents
            };
            await persist();
            render();
          }
        );
      } catch(e){
        alert('Could not read that file. Make sure it\'s a valid Plains Planner backup.');
      }
    });
    input.click();
  }

  // ---------------------------------------------------------------
  // Tabs
  // ---------------------------------------------------------------
  document.getElementById('tabs').addEventListener('click', e => {
    const btn = e.target.closest('.tab');
    if (!btn) return;
    ui.tab = btn.dataset.tab;
    if (ui.tab === 'calendar' && !ui.selectedDay){
      ui.selectedDay = todayIso();
    }
    render();
  });

  // ---------------------------------------------------------------
  // Init
  // ---------------------------------------------------------------
  document.getElementById('exportBtn').addEventListener('click', exportData);
  document.getElementById('importBtn').addEventListener('click', importData);

  document.getElementById('shareBtn').addEventListener('click', () => {
    const url = 'https://jbprice2.github.io/Plains-Planner/app.html';
    navigator.clipboard.writeText(url).then(() => {
      const fb = document.getElementById('shareFeedback');
      fb.style.display = 'block';
      setTimeout(() => { fb.style.display = 'none'; }, 2500);
    });
  });

        <h2 style="font-size:1.5rem; margin:0.3rem 0 0.5rem;">Welcome to The Plains Planner</h2>
        <p style="color:var(--ink-soft); font-size:0.9rem; margin:0;">Your personal Auburn hub — clubs, schedule, and involvement all in one place.</p>
      </div>

        <div>

          <h4>Clubs Directory</h4>

        </div>
      </div>
      <div class="onboard-feature">
        <div class="onboard-icon">🗓️</div>

          <h4>Weekly Schedule</h4>
          <p>Add your classes and recurring meetings once — they fill in your calendar automatically all semester.</p>
        </div>
      </div>
      <div class="onboard-feature">
        <div class="onboard-icon">📋</div>
        <div>

          <p>Log shadowing hours, volunteer shifts, research, and leadership. Export a clean summary for resumes and advisors.</p>
        </div>
      </div>

      <p style="font-size:0.8rem; color:var(--ink-soft); text-align:center; margin:1rem 0 0.5rem;">

      </p>
      <div class="modal-actions" style="justify-content:center;">
        <button class="btn-primary" id="onboardDoneBtn" style="width:100%; padding:0.8rem;">Get started →</button>
      </div>
    `;

    document.getElementById('onboardDoneBtn').addEventListener('click', () => {
      localStorage.setItem(WELCOMED_KEY, '1');
      closeModal();
    });

    overlay.classList.add('open');
  }

  // ---------------------------------------------------------------
  // Init
  // ---------------------------------------------------------------
  (async function init(){
    await loadData();
    ui.selectedDay = todayIso();
    render();
    if (!localStorage.getItem(WELCOMED_KEY)){
      showOnboarding();
    }
  })();
</script>
